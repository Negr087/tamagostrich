<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avestruz 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%);
    font-family: 'Segoe UI', sans-serif;
  }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
    text-align: center;
  }
  #title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #c9a0ff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(160,100,255,0.4);
  }
</style>
</head>
<body>
<div id="title">Avestruz Violeta 3D</div>
<div id="info">Arrastrá para rotar · Scroll para zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d0d1a, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 10);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Materials
const purpleMat = new THREE.MeshStandardMaterial({
  color: 0x9370DB,
  roughness: 0.4,
  metalness: 0.05,
});
const darkPurpleMat = new THREE.MeshStandardMaterial({
  color: 0x7B5EA7,
  roughness: 0.5,
  metalness: 0.05,
});
const beakMat = new THREE.MeshStandardMaterial({
  color: 0xF5A623,
  roughness: 0.3,
  metalness: 0.1,
});
const eyeWhiteMat = new THREE.MeshStandardMaterial({
  color: 0xFFFFFF,
  roughness: 0.2,
  metalness: 0.0,
});
const eyePupilMat = new THREE.MeshStandardMaterial({
  color: 0x2D1B69,
  roughness: 0.1,
  metalness: 0.3,
});
const eyeIrisMat = new THREE.MeshStandardMaterial({
  color: 0x8B5CF6,
  roughness: 0.15,
  metalness: 0.2,
});
const legMat = new THREE.MeshStandardMaterial({
  color: 0xF5A623,
  roughness: 0.5,
  metalness: 0.0,
});
const tongueMat = new THREE.MeshStandardMaterial({
  color: 0xFF6B8A,
  roughness: 0.4,
  metalness: 0.0,
});

// Bird group
const bird = new THREE.Group();

// Body
const bodyGeo = new THREE.SphereGeometry(1.3, 32, 32);
bodyGeo.scale(1, 0.85, 0.9);
const body = new THREE.Mesh(bodyGeo, purpleMat);
body.position.set(0, 1.8, 0);
body.castShadow = true;
bird.add(body);

// Feather tufts on body
function createFeatherTuft(x, y, z, scale) {
  const group = new THREE.Group();
  for (let i = 0; i < 5; i++) {
    const geo = new THREE.SphereGeometry(0.18 * scale, 12, 12);
    geo.scale(1, 1.3, 0.8);
    const mesh = new THREE.Mesh(geo, darkPurpleMat);
    const angle = (i / 5) * Math.PI * 0.8 - Math.PI * 0.4;
    mesh.position.set(Math.sin(angle) * 0.15 * scale, Math.cos(angle) * 0.15 * scale, 0);
    mesh.rotation.z = angle * 0.5;
    mesh.castShadow = true;
    group.add(mesh);
  }
  group.position.set(x, y, z);
  return group;
}

// Feathers around body
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const x = Math.sin(angle) * 1.1;
  const z = Math.cos(angle) * 0.8;
  bird.add(createFeatherTuft(x, 1.4, z, 1.2));
}

// Neck
const neckGroup = new THREE.Group();
const neckSegments = 6;
for (let i = 0; i < neckSegments; i++) {
  const t = i / neckSegments;
  const geo = new THREE.SphereGeometry(0.35 - t * 0.08, 16, 16);
  const seg = new THREE.Mesh(geo, purpleMat);
  seg.position.set(0, 2.5 + t * 1.5, -0.1 + t * 0.2);
  seg.castShadow = true;
  neckGroup.add(seg);
}
bird.add(neckGroup);

// Head
const headGeo = new THREE.SphereGeometry(0.6, 32, 32);
headGeo.scale(1, 0.9, 0.95);
const head = new THREE.Mesh(headGeo, purpleMat);
head.position.set(0, 4.3, 0.15);
head.castShadow = true;
bird.add(head);

// Hair tufts on top
const hairGroup = new THREE.Group();
for (let i = 0; i < 7; i++) {
  const geo = new THREE.SphereGeometry(0.08, 8, 8);
  geo.scale(0.6, 2.2, 0.6);
  const hair = new THREE.Mesh(geo, darkPurpleMat);
  const angle = (i / 7) * Math.PI - Math.PI * 0.5;
  hair.position.set(
    Math.sin(angle) * 0.25,
    4.85 + Math.random() * 0.2,
    0.15 + Math.cos(angle) * 0.1
  );
  hair.rotation.z = angle * 0.4;
  hair.rotation.x = -0.2;
  hairGroup.add(hair);
}
bird.add(hairGroup);

// Eyebrows
function createEyebrow(side) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.quadraticCurveTo(0.15, 0.12, 0.35, 0.05);
  shape.quadraticCurveTo(0.15, 0.08, 0, 0);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.04, bevelEnabled: false });
  const brow = new THREE.Mesh(geo, darkPurpleMat);
  brow.position.set(side * 0.1, 4.65, 0.5);
  brow.rotation.y = side * 0.3;
  brow.rotation.z = side * -0.2;
  brow.scale.x = side;
  return brow;
}
bird.add(createEyebrow(1));
bird.add(createEyebrow(-1));

// Eyes
function createEye(side) {
  const eyeGroup = new THREE.Group();

  const whiteGeo = new THREE.SphereGeometry(0.22, 24, 24);
  whiteGeo.scale(1, 1.1, 0.6);
  const white = new THREE.Mesh(whiteGeo, eyeWhiteMat);
  eyeGroup.add(white);

  const irisGeo = new THREE.SphereGeometry(0.14, 20, 20);
  irisGeo.scale(1, 1, 0.5);
  const iris = new THREE.Mesh(irisGeo, eyeIrisMat);
  iris.position.z = 0.08;
  eyeGroup.add(iris);

  const pupilGeo = new THREE.SphereGeometry(0.08, 16, 16);
  pupilGeo.scale(1, 1, 0.4);
  const pupil = new THREE.Mesh(pupilGeo, eyePupilMat);
  pupil.position.z = 0.12;
  eyeGroup.add(pupil);

  // Shine
  const shineGeo = new THREE.SphereGeometry(0.035, 8, 8);
  const shineMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
  const shine = new THREE.Mesh(shineGeo, shineMat);
  shine.position.set(0.04, 0.05, 0.15);
  eyeGroup.add(shine);

  eyeGroup.position.set(side * 0.35, 4.4, 0.4);
  eyeGroup.rotation.y = side * 0.25;
  return eyeGroup;
}
bird.add(createEye(1));
bird.add(createEye(-1));

// Beak
const beakGroup = new THREE.Group();
// Upper beak
const upperBeakGeo = new THREE.SphereGeometry(0.25, 16, 16);
upperBeakGeo.scale(1.2, 0.5, 1.8);
const upperBeak = new THREE.Mesh(upperBeakGeo, beakMat);
upperBeak.position.set(0, 4.15, 0.7);
beakGroup.add(upperBeak);

// Lower beak
const lowerBeakGeo = new THREE.SphereGeometry(0.2, 16, 16);
lowerBeakGeo.scale(1, 0.35, 1.5);
const lowerBeak = new THREE.Mesh(lowerBeakGeo, beakMat);
lowerBeak.position.set(0, 4.0, 0.65);
beakGroup.add(lowerBeak);

// Tongue
const tongueGeo = new THREE.SphereGeometry(0.1, 12, 12);
tongueGeo.scale(0.8, 0.4, 1.5);
const tongue = new THREE.Mesh(tongueGeo, tongueMat);
tongue.position.set(0, 3.95, 0.85);
beakGroup.add(tongue);

bird.add(beakGroup);

// Legs
function createLeg(side) {
  const legGroup = new THREE.Group();

  // Upper leg
  const upperGeo = new THREE.CylinderGeometry(0.1, 0.08, 1.0, 12);
  const upper = new THREE.Mesh(upperGeo, legMat);
  upper.position.set(side * 0.4, 0.7, 0);
  upper.rotation.z = side * 0.15;
  upper.castShadow = true;
  legGroup.add(upper);

  // Lower leg
  const lowerGeo = new THREE.CylinderGeometry(0.08, 0.06, 0.8, 12);
  const lower = new THREE.Mesh(lowerGeo, legMat);
  lower.position.set(side * 0.5, 0.15, 0.05);
  lower.castShadow = true;
  legGroup.add(lower);

  // Foot - 3 toes
  for (let t = -1; t <= 1; t++) {
    const toeGeo = new THREE.SphereGeometry(0.06, 8, 8);
    toeGeo.scale(0.8, 0.4, 2.0);
    const toe = new THREE.Mesh(toeGeo, legMat);
    toe.position.set(side * 0.5 + t * 0.08, -0.15, 0.15 + Math.abs(t) * -0.05);
    toe.castShadow = true;
    legGroup.add(toe);
  }

  return legGroup;
}
bird.add(createLeg(1));
bird.add(createLeg(-1));

// Wings (small, tucked)
function createWing(side) {
  const wingGroup = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const geo = new THREE.SphereGeometry(0.2, 12, 12);
    geo.scale(0.7, 1.2, 0.6);
    const feather = new THREE.Mesh(geo, darkPurpleMat);
    const angle = (i / 6) * Math.PI * 0.5;
    feather.position.set(
      side * (1.2 + Math.sin(angle) * 0.2),
      2.0 - i * 0.15,
      -0.1
    );
    feather.rotation.z = side * (0.3 + i * 0.08);
    feather.castShadow = true;
    wingGroup.add(feather);
  }
  return wingGroup;
}
bird.add(createWing(1));
bird.add(createWing(-1));

// Tail feathers
for (let i = 0; i < 5; i++) {
  const geo = new THREE.SphereGeometry(0.18, 12, 12);
  geo.scale(0.6, 1.3, 0.8);
  const feather = new THREE.Mesh(geo, darkPurpleMat);
  const angle = (i / 5) * Math.PI * 0.6 - Math.PI * 0.3;
  feather.position.set(
    Math.sin(angle) * 0.3,
    1.5 + Math.cos(angle) * 0.15,
    -0.9
  );
  feather.rotation.x = 0.4;
  feather.rotation.z = angle * 0.3;
  feather.castShadow = true;
  bird.add(feather);
}

scene.add(bird);

// Ground
const groundGeo = new THREE.CircleGeometry(15, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  roughness: 0.8,
  metalness: 0.2,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.2;
ground.receiveShadow = true;
scene.add(ground);

// Shadow circle under bird
const shadowGeo = new THREE.CircleGeometry(1.5, 32);
const shadowMat = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0.3,
});
const shadowCircle = new THREE.Mesh(shadowGeo, shadowMat);
shadowCircle.rotation.x = -Math.PI / 2;
shadowCircle.position.y = -0.18;
scene.add(shadowCircle);

// Lights
const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
mainLight.position.set(5, 8, 5);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 1024;
mainLight.shadow.mapSize.height = 1024;
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 50;
scene.add(mainLight);

const rimLight = new THREE.DirectionalLight(0x8B5CF6, 0.6);
rimLight.position.set(-5, 3, -3);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xC084FC, 0.5, 20);
fillLight.position.set(0, 5, 5);
scene.add(fillLight);

const bottomLight = new THREE.PointLight(0xF5A623, 0.3, 10);
bottomLight.position.set(0, 0, 3);
scene.add(bottomLight);

// Particles
const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 20;
  positions[i * 3 + 1] = Math.random() * 12;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xC084FC,
  size: 0.05,
  transparent: true,
  opacity: 0.6,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Orbit controls (manual)
let isDragging = false;
let previousMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3, radius: 10 };

function updateCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi) + 2;
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 2.2, 0);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  isDragging = true;
  previousMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - previousMouse.x;
  const dy = e.clientY - previousMouse.y;
  spherical.theta += dx * 0.008;
  spherical.phi = Math.max(0.3, Math.min(Math.PI * 0.8, spherical.phi + dy * 0.008));
  previousMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});
renderer.domElement.addEventListener('pointerup', () => isDragging = false);
renderer.domElement.addEventListener('wheel', (e) => {
  spherical.radius = Math.max(5, Math.min(20, spherical.radius + e.deltaY * 0.01));
  updateCamera();
});

updateCamera();

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle bob
  bird.position.y = Math.sin(t * 1.5) * 0.1;

  // Slight body sway
  bird.rotation.z = Math.sin(t * 0.8) * 0.03;
  bird.rotation.x = Math.sin(t * 1.2) * 0.02;

  // Hair sway
  hairGroup.children.forEach((h, i) => {
    h.rotation.z = Math.sin(t * 2 + i * 0.5) * 0.15;
  });

  // Beak open/close (breathing)
  beakGroup.children[1].position.y = 4.0 + Math.sin(t * 3) * 0.02;

  // Particle float
  const pos = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] += 0.003;
    if (pos[i * 3 + 1] > 12) pos[i * 3 + 1] = 0;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Auto-rotate slowly when not dragging
  if (!isDragging) {
    spherical.theta += 0.003;
    updateCamera();
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
